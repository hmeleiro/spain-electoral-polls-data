name: Deploy Poll of Polls Repo

on:
  push:
  workflow_dispatch:

concurrency:
  group: spain-electoral-polls-deploy-${{ github.ref }}
  cancel-in-progress: true

jobs:
  deploy:
    runs-on: ubuntu-latest
    timeout-minutes: 15

    env:
      DEPLOY_HOST: ${{ secrets.DEPLOY_HOST }}
      DEPLOY_USER: ${{ secrets.DEPLOY_USER }}
      DEPLOY_PORT: ${{ secrets.DEPLOY_PORT || '22' }}
      DEPLOY_PATH: ${{ secrets.DEPLOY_PATH }}
      DEPLOY_SSH_KEY: ${{ secrets.DEPLOY_SSH_KEY }}
      DEPLOY_KNOWN_HOSTS: ${{ secrets.DEPLOY_KNOWN_HOSTS }}

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Validate deploy configuration
        shell: bash
        run: |
          set -euo pipefail

          for name in DEPLOY_HOST DEPLOY_USER DEPLOY_PORT DEPLOY_PATH DEPLOY_SSH_KEY; do
            if [ -z "${!name}" ]; then
              echo "::error::Missing required secret: ${name}"
              exit 1
            fi
          done

          case "${DEPLOY_PATH}" in
            /*) ;;
            *)
              echo "::error::DEPLOY_PATH must be an absolute path"
              exit 1
              ;;
          esac

          if [[ "${DEPLOY_PATH}" == *"'"* ]]; then
            echo "::error::DEPLOY_PATH cannot contain single quotes"
            exit 1
          fi

      - name: Configure SSH
        shell: bash
        run: |
          set -euo pipefail

          mkdir -p ~/.ssh
          chmod 700 ~/.ssh
          printf '%s\n' "${DEPLOY_SSH_KEY}" > ~/.ssh/deploy_key
          chmod 600 ~/.ssh/deploy_key

          if [ -n "${DEPLOY_KNOWN_HOSTS}" ]; then
            printf '%s\n' "${DEPLOY_KNOWN_HOSTS}" > ~/.ssh/known_hosts
          else
            ssh-keyscan -p "${DEPLOY_PORT}" "${DEPLOY_HOST}" > ~/.ssh/known_hosts
          fi
          chmod 600 ~/.ssh/known_hosts

      - name: Ensure rsync is available
        shell: bash
        run: |
          set -euo pipefail

          if ! command -v rsync >/dev/null 2>&1; then
            sudo apt-get update
            sudo apt-get install -y rsync
          fi

      - name: Create remote directory
        shell: bash
        run: |
          set -euo pipefail

          ssh -i ~/.ssh/deploy_key \
            -p "${DEPLOY_PORT}" \
            -o IdentitiesOnly=yes \
            -o StrictHostKeyChecking=yes \
            "${DEPLOY_USER}@${DEPLOY_HOST}" \
            "mkdir -p '${DEPLOY_PATH}'"

      - name: Sync repository to remote
        shell: bash
        run: |
          set -euo pipefail

          rsync -az --delete \
            --exclude '.git/' \
            --exclude '.github/' \
            --exclude '.env' \
            --exclude '.Renviron' \
            --exclude '.Rhistory' \
            --exclude '.RData' \
            --exclude '.Rproj.user/' \
            --exclude 'artifacts/' \
            --exclude 'logs/' \
            --exclude 'renv/library/' \
            --exclude 'renv/staging/' \
            --exclude 'renv/sandbox/' \
            -e "ssh -i ~/.ssh/deploy_key -p ${DEPLOY_PORT} -o IdentitiesOnly=yes -o StrictHostKeyChecking=yes" \
            ./ "${DEPLOY_USER}@${DEPLOY_HOST}:${DEPLOY_PATH}/"

      - name: Finalize remote deploy
        shell: bash
        run: |
          set -euo pipefail

          ssh -i ~/.ssh/deploy_key \
            -p "${DEPLOY_PORT}" \
            -o IdentitiesOnly=yes \
            -o StrictHostKeyChecking=yes \
            "${DEPLOY_USER}@${DEPLOY_HOST}" \
            "chmod +x '${DEPLOY_PATH}/scripts/run_pipeline_cron.sh'"
